# PostgreSQL configuration for Mnemos.
#
# Development and test point at the dockerized pgvector instance from
# compose.dev.yml (host port 5433). Override with DATABASE_URL in any
# environment.
#
# Production uses the standard Rails 8 multi-DB setup (primary + solid_*
# auxiliaries), each driven by its own *_DATABASE_URL env var.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5433) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "mnemos") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "mnemos_dev") %>

development:
  <<: *default
  database: mnemos_development

test:
  <<: *default
  database: mnemos_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  database: mnemos_production
  # Single primary database. Solid Queue tables live alongside the application
  # tables — loaded from db/queue_schema.rb by bin/docker-entrypoint on first
  # boot. Solid Cache/Cable aren't used (api_only app, no ActionCable, no heavy
  # caching), so they're not provisioned. Keep this simple while the service
  # is single-being / low-volume.
